<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Quadro de Medicação/Alimentação</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/lista-completa.css" />
  <link rel="stylesheet" href="./css/paleta-cores.css" />

  <!-- 🔥 ANTI SCREEN SAVER CSS -->
  <style>
    body {
      animation: antiBurnIn 60s infinite linear;
    }

    @keyframes antiBurnIn {
      0% {
        transform: translate(0px, 0px);
      }

      25% {
        transform: translate(1px, 0px);
      }

      50% {
        transform: translate(1px, 1px);
      }

      75% {
        transform: translate(0px, 1px);
      }

      100% {
        transform: translate(0px, 0px);
      }
    }
  </style>
</head>

<body>

  <header id="barra-topo">
    <span>
      <span id="nome-atual">UDACI ALVES VALVERDE</span>
      <br>
      <span id="data-atual"></span>
    </span>

    <span id="hora-atual"></span>
  </header>

  <main id="main-layout">
    <section id="lado-esquerdo">
      <ul id="lista"></ul>
    </section>

    <section id="lado-direito">
      <h2>Plano Completo</h2>

      <div class="controle-scroll">
        <button id="btn-up">▲</button>
        <button id="btn-down">▼</button>
      </div>

      <div id="lista-completa-wrapper">
        <div id="lista-completa"></div>
      </div>
    </section>
  </main>

  <script src="./js/webos.js" defer></script>
  <script src="./js/keep-alive.js" defer></script>
  <script src="./js/anti-burnin.js" defer></script> <!-- NOVO -->
  <script src="./js/script.js" defer></script>
  <script src="./js/lista-completa.js" defer></script>
  <script src="./js/anti-burnin-pro.js" defer></script>
  
</body>

</html>
